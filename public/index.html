  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Detroit Sports Schedule",
    "description": "Track upcoming Detroit sports games for Lions, Pistons, Tigers, and Red Wings",
    "url": "https://scoreboard-generator.up.railway.app/",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://scoreboard-generator.up.railway.app/?team={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            lions: '#005A8B',
            pistons: '#C8102E',
            tigers: '#0C2340',
            redwings: '#CE1126'
          }
        }
      }
    }
  </script>
  <style>
    .odds-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out, padding 0.3s ease-out;
    }
    .odds-panel.open {
      max-height: 200px;
      padding-top: 1rem;
      padding-bottom: 1rem;
    }
    .game-card {
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    .game-card:hover {
      transform: scale(1.01);
    }
    .game-card.expanded {
      border-radius: 0.75rem 0.75rem 0 0;
    }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen bg-cover bg-center bg-fixed" style="background-image: url('https://pub-d0714c2682ac4db6ba129c2044cd3629.r2.dev/whatup%20doe%20background.png')">
  <div class="min-h-screen bg-black/60">
  <div class="max-w-4xl mx-auto px-4 py-8">
    <!-- Header -->
    <header class="text-center mb-10">
      <h1 class="text-4xl font-bold mb-2">Detroit Sports</h1>
      <p class="text-gray-400">Upcoming Games</p>
    </header>

    <!-- Filter Tabs -->
    <div class="flex justify-center gap-2 mb-8 flex-wrap">
      <button onclick="filterGames('all')" data-filter="all" class="filter-btn px-4 py-2 rounded-full bg-white text-gray-900 font-medium transition">
        All Teams
      </button>
      <button onclick="filterGames('lions')" data-filter="lions" class="filter-btn px-4 py-2 rounded-full bg-gray-700 hover:bg-lions transition">
        Lions
      </button>
      <button onclick="filterGames('pistons')" data-filter="pistons" class="filter-btn px-4 py-2 rounded-full bg-gray-700 hover:bg-pistons transition">
        Pistons
      </button>
      <button onclick="filterGames('tigers')" data-filter="tigers" class="filter-btn px-4 py-2 rounded-full bg-gray-700 hover:bg-tigers transition">
        Tigers
      </button>
      <button onclick="filterGames('redwings')" data-filter="redwings" class="filter-btn px-4 py-2 rounded-full bg-gray-700 hover:bg-redwings transition">
        Red Wings
      </button>
    </div>

    <!-- Games List -->
    <div id="games-container" class="space-y-4">
      <div class="text-center text-gray-400 py-8">Loading games...</div>
    </div>

    <!-- Footer -->
    <footer class="text-center mt-12 text-gray-500 text-sm">
      Data from ESPN • Click a game for odds
    </footer>
  </div>

  <script>
    let allGames = [];
    let currentFilter = 'all';
    let expandedGame = null;
    let oddsCache = {};

    const teamColors = {
      lions: '#005A8B',
      pistons: '#C8102E',
      tigers: '#0C2340',
      redwings: '#CE1126'
    };

    const teamLogos = {
      lions: '🦁',
      pistons: '🏀',
      tigers: '🐯',
      redwings: '🏒'
    };

    async function fetchGames() {
      try {
        const res = await fetch('/api/upcoming?days=14');
        allGames = await res.json();
        renderGames();
      } catch (err) {
        document.getElementById('games-container').innerHTML = `
          <div class="text-center text-red-400 py-8">Failed to load games</div>
        `;
      }
    }

    async function toggleOdds(eventId) {
      const panel = document.getElementById(`odds-${eventId}`);
      const card = document.getElementById(`card-${eventId}`);

      // Close previously expanded
      if (expandedGame && expandedGame !== eventId) {
        const prevPanel = document.getElementById(`odds-${expandedGame}`);
        const prevCard = document.getElementById(`card-${expandedGame}`);
        if (prevPanel) prevPanel.classList.remove('open');
        if (prevCard) prevCard.classList.remove('expanded');
      }

      // Toggle current
      if (expandedGame === eventId) {
        panel.classList.remove('open');
        card.classList.remove('expanded');
        expandedGame = null;
        return;
      }

      expandedGame = eventId;
      card.classList.add('expanded');
      panel.classList.add('open');

      // Show loading
      panel.innerHTML = `
        <div class="text-center text-gray-400">
          <span class="inline-block animate-pulse">Loading odds...</span>
        </div>
      `;

      // Fetch odds if not cached
      if (!oddsCache[eventId]) {
        try {
          const res = await fetch(`/api/odds/${eventId}`);
          oddsCache[eventId] = await res.json();
        } catch (err) {
          oddsCache[eventId] = { error: true };
        }
      }

      // Render odds
      const odds = oddsCache[eventId];

      if (odds.error || odds.message) {
        panel.innerHTML = `
          <div class="text-center text-gray-500 text-sm">
            No odds available for this game
          </div>
        `;
        return;
      }

      let html = '<div class="grid grid-cols-2 gap-4">';

      // Opening odds
      if (odds.opening) {
        html += `
          <div class="bg-gray-900 rounded-lg p-3">
            <div class="text-xs text-gray-500 uppercase mb-2">Opening Line</div>
            <div class="space-y-1">
              ${odds.opening.spread ? `<div class="flex justify-between"><span class="text-gray-400">Spread</span><span class="font-mono">${odds.opening.spread}</span></div>` : ''}
              ${odds.opening.overUnder ? `<div class="flex justify-between"><span class="text-gray-400">O/U</span><span class="font-mono">${odds.opening.overUnder}</span></div>` : ''}
              ${odds.opening.moneyLine ? `<div class="flex justify-between"><span class="text-gray-400">ML</span><span class="font-mono">${odds.opening.moneyLine}</span></div>` : ''}
            </div>
            <div class="text-xs text-gray-600 mt-2">${odds.opening.provider || ''}</div>
          </div>
        `;
      }

      // Closing odds
      if (odds.closing) {
        html += `
          <div class="bg-gray-900 rounded-lg p-3">
            <div class="text-xs text-gray-500 uppercase mb-2">Closing Line</div>
            <div class="space-y-1">
              ${odds.closing.spread ? `<div class="flex justify-between"><span class="text-gray-400">Spread</span><span class="font-mono">${odds.closing.spread}</span></div>` : ''}
              ${odds.closing.overUnder ? `<div class="flex justify-between"><span class="text-gray-400">O/U</span><span class="font-mono">${odds.closing.overUnder}</span></div>` : ''}
              ${odds.closing.moneyLine ? `<div class="flex justify-between"><span class="text-gray-400">ML</span><span class="font-mono">${odds.closing.moneyLine}</span></div>` : ''}
            </div>
            <div class="text-xs text-gray-600 mt-2">${odds.closing.provider || ''}</div>
          </div>
        `;
      }

      // If only one type, show single column
      if (!odds.opening && !odds.closing) {
        html = `
          <div class="text-center text-gray-500 text-sm">
            No odds available for this game
          </div>
        `;
      } else if (!odds.opening || !odds.closing) {
        html += '<div></div>'; // Empty grid cell
      }

      html += '</div>';
      panel.innerHTML = html;
    }

    function filterGames(teamId) {
      currentFilter = teamId;
      expandedGame = null;

      // Update button styles
      document.querySelectorAll('.filter-btn').forEach(btn => {
        const filter = btn.dataset.filter;
        if (filter === teamId) {
          if (teamId === 'all') {
            btn.className = 'filter-btn px-4 py-2 rounded-full bg-white text-gray-900 font-medium transition';
          } else {
            btn.className = `filter-btn px-4 py-2 rounded-full text-white font-medium transition`;
            btn.style.backgroundColor = teamColors[teamId];
          }
        } else {
          btn.className = 'filter-btn px-4 py-2 rounded-full bg-gray-700 hover:opacity-80 transition';
          btn.style.backgroundColor = '';
        }
      });

      renderGames();
    }

    function renderGames() {
      const container = document.getElementById('games-container');

      const filtered = currentFilter === 'all'
        ? allGames
        : allGames.filter(g => g.team.id === currentFilter);

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="text-center text-gray-400 py-8">No upcoming games</div>
        `;
        return;
      }

      // Group by date
      const grouped = {};
      filtered.forEach(game => {
        const date = new Date(game.date).toLocaleDateString('en-US', {
          weekday: 'long',
          month: 'short',
          day: 'numeric'
        });
        if (!grouped[date]) grouped[date] = [];
        grouped[date].push(game);
      });

      let html = '';
      for (const [date, games] of Object.entries(grouped)) {
        html += `<div class="mb-6">
          <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wide mb-3">${date}</h2>
          <div class="space-y-3">`;

        games.forEach(game => {
          const time = new Date(game.date).toLocaleTimeString('en-US', {
            hour: 'numeric',
            minute: '2-digit'
          });
          const teamColor = teamColors[game.team.id];
          const logo = teamLogos[game.team.id];

          html += `
            <div class="overflow-hidden rounded-xl">
              <div id="card-${game.eventId}" onclick="toggleOdds('${game.eventId}')"
                   class="game-card bg-gray-800 p-4 flex items-center gap-4 border-l-4 rounded-xl"
                   style="border-color: ${teamColor}">
                <div class="text-3xl">${logo}</div>
                <div class="flex-1">
                  <div class="font-semibold">${game.team.name}</div>
                  <div class="text-gray-400 text-sm">vs ${game.opponent}</div>
                </div>
                <div class="text-right">
                  <div class="font-medium">${time}</div>
                  <div class="text-xs px-2 py-1 rounded ${game.home ? 'bg-green-900 text-green-300' : 'bg-gray-700 text-gray-300'}">
                    ${game.home ? 'HOME' : 'AWAY'}
                  </div>
                </div>
                <div class="text-gray-500">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                  </svg>
                </div>
              </div>
              <div id="odds-${game.eventId}" class="odds-panel bg-gray-800 border-l-4 px-4" style="border-color: ${teamColor}">
              </div>
            </div>
          `;
        });

        html += '</div></div>';
      }

      container.innerHTML = html;
    }

    // Initial load
    fetchGames();

    // Refresh every 5 minutes
    setInterval(fetchGames, 5 * 60 * 1000);
  </script>
  </div>
</body>
</html>
