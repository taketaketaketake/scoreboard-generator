<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline Dashboard - Michigan Sports</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23111827' width='100' height='100' rx='20'/><text x='50' y='72' font-size='60' font-weight='bold' fill='white' text-anchor='middle' font-family='system-ui'>D</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .event-row {
      transition: background-color 0.15s ease;
    }
    .event-row:hover {
      background-color: rgba(255,255,255,0.05);
    }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div class="max-w-5xl mx-auto px-4 py-8">
    <!-- Header -->
    <header class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold">Pipeline Dashboard</h1>
        <p class="text-gray-400 text-sm">Observability for Michigan Sports</p>
      </div>
      <div class="flex items-center gap-4">
        <span id="last-updated" class="text-gray-500 text-sm"></span>
        <button onclick="refresh()" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm transition">
          Refresh
        </button>
        <a href="/" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm transition">
          Back to Schedule
        </a>
      </div>
    </header>

    <!-- Stats Cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="bg-gray-800 rounded-xl p-4">
        <div class="text-3xl font-bold" id="stat-total">-</div>
        <div class="text-gray-400 text-sm">Total Jobs</div>
      </div>
      <div class="bg-gray-800 rounded-xl p-4">
        <div class="text-3xl font-bold text-green-400" id="stat-success">-</div>
        <div class="text-gray-400 text-sm">Successful</div>
      </div>
      <div class="bg-gray-800 rounded-xl p-4">
        <div class="text-3xl font-bold text-red-400" id="stat-failed">-</div>
        <div class="text-gray-400 text-sm">Failed</div>
      </div>
      <div class="bg-gray-800 rounded-xl p-4">
        <div class="text-3xl font-bold text-blue-400" id="stat-scheduled">-</div>
        <div class="text-gray-400 text-sm">Scheduled</div>
      </div>
    </div>

    <!-- Success Rate -->
    <div class="bg-gray-800 rounded-xl p-4 mb-8">
      <div class="flex items-center justify-between mb-2">
        <span class="text-gray-400 text-sm">Success Rate (Today)</span>
        <span class="text-lg font-bold" id="success-rate">-</span>
      </div>
      <div class="w-full bg-gray-700 rounded-full h-2">
        <div id="success-bar" class="bg-green-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
      </div>
    </div>

    <!-- Two Column Layout -->
    <div class="grid md:grid-cols-2 gap-6 mb-8">
      <!-- Scheduled Jobs -->
      <div class="bg-gray-800 rounded-xl p-4">
        <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
          <span class="text-blue-400">&#9203;</span> Scheduled Jobs
        </h2>
        <div id="scheduled-jobs" class="space-y-3">
          <div class="text-gray-500 text-sm">Loading...</div>
        </div>
      </div>

      <!-- Quick Stats by Type -->
      <div class="bg-gray-800 rounded-xl p-4">
        <h2 class="text-lg font-semibold mb-4">Events by Type</h2>
        <div id="events-by-type" class="space-y-2">
          <div class="text-gray-500 text-sm">Loading...</div>
        </div>
      </div>
    </div>

    <!-- Recent Events -->
    <div class="bg-gray-800 rounded-xl p-4">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold">Recent Events</h2>
        <select id="days-filter" onchange="refresh()" class="bg-gray-700 text-sm rounded px-3 py-1">
          <option value="1">Today</option>
          <option value="2">Last 2 days</option>
          <option value="7">Last 7 days</option>
        </select>
      </div>
      <div id="events-table" class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-left text-gray-400 border-b border-gray-700">
              <th class="pb-2 pr-4">Time</th>
              <th class="pb-2 pr-4">Type</th>
              <th class="pb-2 pr-4">Job</th>
              <th class="pb-2">Details</th>
            </tr>
          </thead>
          <tbody id="events-body">
            <tr><td colspan="4" class="py-4 text-gray-500">Loading events...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Footer -->
    <footer class="text-center mt-8 text-gray-500 text-sm">
      Auto-refreshes every 5 minutes
    </footer>
  </div>

  <script>
    const eventTypeConfig = {
      'job.started': { icon: '&#9654;', color: 'text-yellow-400', label: 'Started' },
      'job.completed': { icon: '&#10003;', color: 'text-green-400', label: 'Completed' },
      'job.failed': { icon: '&#10007;', color: 'text-red-400', label: 'Failed' },
      'job.scheduled': { icon: '&#128197;', color: 'text-blue-400', label: 'Scheduled' },
      'game.final': { icon: '&#127942;', color: 'text-purple-400', label: 'Game Final' },
      'image.generated': { icon: '&#128247;', color: 'text-cyan-400', label: 'Image' },
      'r2.uploaded': { icon: '&#9729;', color: 'text-orange-400', label: 'Uploaded' },
      'twilio.sent': { icon: '&#128241;', color: 'text-green-300', label: 'MMS Sent' },
      'odds.captured': { icon: '&#128200;', color: 'text-indigo-400', label: 'Odds' }
    };

    async function fetchStats() {
      const days = document.getElementById('days-filter').value;
      try {
        const res = await fetch(`/api/events/stats?days=${days}`);
        const stats = await res.json();

        document.getElementById('stat-total').textContent = stats.jobs.started || 0;
        document.getElementById('stat-success').textContent = stats.jobs.completed || 0;
        document.getElementById('stat-failed').textContent = stats.jobs.failed || 0;
        document.getElementById('stat-scheduled').textContent = stats.jobs.scheduled || 0;
        document.getElementById('success-rate').textContent = stats.successRate + '%';
        document.getElementById('success-bar').style.width = stats.successRate + '%';

        // Events by type
        const byTypeEl = document.getElementById('events-by-type');
        if (Object.keys(stats.byType).length === 0) {
          byTypeEl.innerHTML = '<div class="text-gray-500 text-sm">No events yet</div>';
        } else {
          byTypeEl.innerHTML = Object.entries(stats.byType)
            .sort((a, b) => b[1] - a[1])
            .map(([type, count]) => {
              const cfg = eventTypeConfig[type] || { icon: '&#8226;', color: 'text-gray-400', label: type };
              return `
                <div class="flex items-center justify-between py-1">
                  <span class="${cfg.color}">${cfg.icon} ${cfg.label}</span>
                  <span class="text-gray-300 font-mono">${count}</span>
                </div>
              `;
            }).join('');
        }
      } catch (err) {
        console.error('Failed to fetch stats:', err);
      }
    }

    async function fetchScheduledJobs() {
      try {
        const res = await fetch('/api/scheduled');
        const jobs = await res.json();

        const container = document.getElementById('scheduled-jobs');
        if (jobs.length === 0) {
          container.innerHTML = '<div class="text-gray-500 text-sm">No jobs scheduled</div>';
          return;
        }

        container.innerHTML = jobs.map(job => {
          const scheduledTime = new Date(job.scheduledFor);
          const now = new Date();
          const diffMs = scheduledTime - now;
          const diffMins = Math.round(diffMs / 60000);

          let timeLabel;
          if (diffMins < 0) {
            timeLabel = 'overdue';
          } else if (diffMins < 60) {
            timeLabel = `in ${diffMins}m`;
          } else {
            const hours = Math.floor(diffMins / 60);
            const mins = diffMins % 60;
            timeLabel = `in ${hours}h ${mins}m`;
          }

          const jobTypeColors = {
            pregame: 'bg-yellow-900 text-yellow-300',
            postgame: 'bg-purple-900 text-purple-300'
          };
          const typeClass = jobTypeColors[job.jobType] || 'bg-gray-700 text-gray-300';

          return `
            <div class="flex items-center gap-3 p-2 bg-gray-700/50 rounded-lg">
              <span class="text-xs px-2 py-1 rounded ${typeClass}">${job.jobType}</span>
              <div class="flex-1">
                <div class="text-sm font-medium">${job.team || job.name}</div>
                ${job.opponent ? `<div class="text-xs text-gray-400">vs ${job.opponent}</div>` : ''}
              </div>
              <div class="text-right">
                <div class="text-sm">${scheduledTime.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}</div>
                <div class="text-xs text-gray-500">${timeLabel}</div>
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        console.error('Failed to fetch scheduled jobs:', err);
      }
    }

    async function fetchEvents() {
      const days = document.getElementById('days-filter').value;
      try {
        const res = await fetch(`/api/events?days=${days}`);
        const events = await res.json();

        const tbody = document.getElementById('events-body');
        if (events.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="py-4 text-gray-500">No events recorded</td></tr>';
          return;
        }

        tbody.innerHTML = events.slice(0, 50).map(event => {
          const time = new Date(event.timestamp);
          const cfg = eventTypeConfig[event.type] || { icon: '&#8226;', color: 'text-gray-400', label: event.type };

          // Build details string
          let details = [];
          if (event.team) details.push(event.team);
          if (event.opponent) details.push(`vs ${event.opponent}`);
          if (event.result?.score) details.push(event.result.score);
          if (event.error) details.push(`Error: ${event.error}`);
          if (event.duration) details.push(`${(event.duration / 1000).toFixed(1)}s`);
          if (event.url) details.push('URL saved');
          if (event.path) details.push(event.path.split('/').pop());

          const isToday = time.toDateString() === new Date().toDateString();
          const timeStr = isToday
            ? time.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
            : time.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });

          return `
            <tr class="event-row border-b border-gray-700/50">
              <td class="py-2 pr-4 text-gray-400 whitespace-nowrap">${timeStr}</td>
              <td class="py-2 pr-4 whitespace-nowrap">
                <span class="${cfg.color}">${cfg.icon}</span>
                <span class="text-gray-300 ml-1">${cfg.label}</span>
              </td>
              <td class="py-2 pr-4 whitespace-nowrap">
                <span class="text-xs px-2 py-0.5 rounded bg-gray-700">${event.jobType || '-'}</span>
              </td>
              <td class="py-2 text-gray-400 text-xs">${details.join(' | ') || '-'}</td>
            </tr>
          `;
        }).join('');
      } catch (err) {
        console.error('Failed to fetch events:', err);
      }
    }

    async function refresh() {
      document.getElementById('last-updated').textContent = 'Updating...';
      await Promise.all([fetchStats(), fetchScheduledJobs(), fetchEvents()]);
      document.getElementById('last-updated').textContent =
        `Updated ${new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}`;
    }

    // Initial load
    refresh();

    // Auto-refresh every 5 minutes
    setInterval(refresh, 5 * 60 * 1000);
  </script>
</body>
</html>
